<div class="cart-navigation px-6">

    </button>
  </div>

  <div class="cart-summary md:fixed md:right-0 md:top-0 md:h-full md:w-80 md:flex md:flex-col md:justify-center md:px-8">

    <div class="flex flex-col gap-3 py-6">

      <a href="/" class="w-full text-center border border-black text-[14px] font-medium py-4 cursor-pointer hover:bg-neutral-50 transition-colors hidden md:block">

    <div class="flex flex-col border-t border-(--border)">

        <span>+</span>
      </button>
    </div>
